[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    integration: Integration tests (slow)
    slow: Slow tests
    requires_network: Tests requiring network access
    requires_browser: Tests requiring Playwright browser
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[coverage:run]
source = proxy_toolkit
omit = 
    */tests/*
    */venv/*
    */env/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError
show_missing = True
precision = 2

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
